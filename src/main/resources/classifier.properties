# flac-classifier configuration
#
# This file is the single source of truth for all classifier defaults.
# To override values, place a properties file at one of these locations
# (first match wins):
#   ~/.config/flac-classifier/config.properties   (user-level)
#   ./flac-classifier.properties                  (working directory)
#
# Only the properties you want to change need to appear in your override file.

# ── Spectral Analysis ──────────────────────────────────────────────────────────

# Minimum level (dB relative to peak) for a frequency bin to be considered above
# the noise floor. Raise toward 0 to be less sensitive to faint HF content.
spectral.cutoffThresholdDb=-60.0

# Slope threshold (dB) below which a rolloff is classified as brick-wall (MP3-like).
spectral.slopeBrickWallDb=-40.0

# Slope threshold (dB) below which a rolloff is classified as gradual (AAC-like).
# Values between slopeBrickWallDb and slopeGradualDb are considered gradual;
# values above slopeGradualDb are considered psychoacoustic.
spectral.slopeGradualDb=-15.0

# Minimum energy ratio (vs. overall peak power) above 22 050 Hz to count as
# genuine hi-res content. Lower values make hi-res detection more sensitive.
spectral.above22kRatioThreshold=0.001

# ── Bit Depth Analysis ─────────────────────────────────────────────────────────

# Maximum number of samples to analyse for bit-depth detection.
# Lower values speed up analysis at the cost of accuracy on short files.
bitdepth.maxSampleCount=500000

# Fraction of low-byte samples that must be zero to flag a 24-bit file as
# zero-padded (i.e. upscaled from 16-bit). 0.99 = 99 % of LSBs are zero.
bitdepth.zeroPaddingThreshold=0.99

# Minimum Shannon entropy (bits) of the LSB byte to classify a file as genuine
# 24-bit. Files below this threshold are considered padded 16-bit.
bitdepth.lsbEntropyThreshold=4.0

# ── Classification ─────────────────────────────────────────────────────────────

# Minimum effective bit depth (bits) to classify a file as true hi-res rather
# than a padded/upscaled recording.
classification.effectiveDepthThreshold=20

# Spectral cutoff frequency (Hz) used as the boundary between "lossy" and
# "full bandwidth". A psychoacoustic rolloff below this frequency is flagged as
# an Ogg Vorbis transcode; a cutoff at or above it is considered full bandwidth.
classification.fullBandwidthCutoffHz=20000.0

# MP3 encoder cutoff fingerprints: semicolon-separated low-high ranges in Hz.
# Each entry corresponds to the label at the same position in mp3BitrateLabels.
classification.mp3CutoffRanges=15500-16500;18500-19500;19500-21000

# Human-readable bitrate labels for each MP3 cutoff range (semicolon-separated).
classification.mp3BitrateLabels=~128 kbps;~192 kbps;~256-320 kbps

# AAC encoder cutoff fingerprints: semicolon-separated low-high ranges in Hz.
classification.aacCutoffRanges=14900-16500;17800-19400

# Human-readable bitrate labels for each AAC cutoff range (semicolon-separated).
classification.aacBitrateLabels=~128 kbps;~192 kbps
